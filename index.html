<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TouristMacas</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  >

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Leaflet Routing -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
  />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="main-header">
  <nav class="navbar navbar-expand-lg navbar-dark container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <i class="bi bi-signpost-2-fill"></i>
      <span data-i18n="app.name">TouristMacas</span>
    </a>

    <!-- ✅ DERECHA: Clima + Idioma + Dark mode -->
    <div class="ms-auto d-flex align-items-center gap-2 tm-header-right">

      <!-- 1) CLIMA -->
      <div id="weatherBadge" class="tm-weather" aria-live="polite" title="Clima">
        <i class="bi bi-cloud-sun"></i>
        <span id="weatherTemp">--°C</span>
      </div>

      <!-- 2) TRADUCCIÓN ES/EN -->
      <button id="btnLang" type="button" class="btn btn-sm tm-chip" aria-label="Cambiar idioma">
        <span id="langES" class="tm-lang active">ES</span>
        <span class="tm-lang-sep">/</span>
        <span id="langEN" class="tm-lang">EN</span>
      </button>

      <!-- 3) MODO OSCURO 🌙/☀ -->
      <button id="btnTheme" type="button" class="btn btn-sm tm-chip" aria-label="Cambiar tema">
        <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
      </button>

    </div>
  </nav>
</header>

<main class="container-fluid my-3">
  <div class="row g-3">

    <!-- PANEL -->
    <aside class="col-lg-3">
      <div class="search-panel">

        <h5><i class="bi bi-search me-2"></i>Panel de búsqueda</h5>

        <select id="provincia" class="form-select mb-2-none" disabled hidden>
          <option value="">🏞️ Seleccione provincia</option>
        </select>

        <select id="canton" class="form-select mb-2-none" disabled hidden>
          <option value="">🏙️ Seleccione cantón</option>
        </select>

        <select id="parroquia" class="form-select mb-2-none" disabled hidden>
          <option value="">🏘️ Seleccione parroquia</option>
        </select>

        <select id="category" class="form-select mb-2 d">
          <option value="">🔎 Seleccione categoría</option>

          <optgroup label="🚍 Transporte">
            <option value="terminal">🚏 Terminal Terrestre</option>
            <option value="transporte_lineas">🚌 Líneas de transporte</option>
            <option value="taxis">🚖 Taxis</option>
            <option value="gasolineras">⛽ Gasolineras</option>
            <option value="mecanicas">🔧 Automotriz</option>
            <option value="parqueaderos">🅿️ Parqueaderos</option>
            <option value="ir_provincia">🧭 Ir a otra provincia (vía Terminal)</option>
            <option value="ir_canton">🧭 Ir a otro ascantón  (vía Terminal)</option>
          </optgroup>

          <optgroup label="🍽️ Alimentación">
            <option value="alimentacion">🍴 Restaurantes</option>
            <option value="cafeterias">☕ Cafeterías</option>
            <option value="bares">🍻 Bares</option>
          </optgroup>

          <optgroup label="🏨 Turismo y Naturaleza">
            <option value="hospedaje">🏨 Hospedaje</option>
            <option value="hosterias">🏕️ Hosterías</option>
            <option value="parques">🌳 Parques</option>
            <option value="naturaleza">🏞️ Naturaleza</option>
          </optgroup>

          <optgroup label="🎶 Ocio">
            <option value="eventosms">📅 Eventos</option>
            <option value="discotecas">🕺 Discotecas</option>
            <option value="centros_recreativos">🎯 Centros recreativos</option>
            <option value="canchas">⚽ Canchas</option>
          </optgroup>

          <optgroup label="🧑‍⚕️ Servicios">
            <option value="belleza">💄 Belleza</option>
            <option value="spa">🧖 Spa</option>
            <option value="gimnasios">🏋️ Gimnasios</option>
            <option value="salud">🏥 Salud</option>
            <option value="farmacias">💊 Farmacias</option>
            <option value="tecnologia_servicios">🛠️ Servicio técnico</option>
            <option value="lavanderias">🧺 Lavanderías</option>
          </optgroup>

          <optgroup label="🛍️ Comercio">
            <option value="tiendas">🛒 Tiendas</option>
            <option value="supermercados">🏬 Supermercados</option>
            <option value="vestimenta">👕 Vestimenta</option>
            <option value="tecnologia_comercio">💻 Tecnología</option>
            <option value="ferreterias">🧰 Ferreterías</option>
          </optgroup>

          <optgroup label="🏛️ Instituciones">
            <option value="instituciones">🏢 Instituciones</option>
            <option value="bancos">🏦 Bancos</option>
            <option value="coop">🏦 Cooperativas</option>
            <option value="policia">👮 Policía</option>
            <option value="bomberos">🚒 Bomberos</option>
          </optgroup>

          <optgroup label="🎓 Educación">
            <option value="educacion">🏫 Escuelas</option>
            <option value="colegios">📚 Colegios</option>
            <option value="universidades">🎓 Universidades</option>
          </optgroup>

          <optgroup label="⛪ Religión">
            <option value="iglesias">⛪ Iglesias</option>
          </optgroup>
        </select>

        <!-- ✅ contenedor fijo del banner -->
        <div id="loc-banner-wrap" class="mt-2"></div>

        <div id="extra-controls" class="mt-3"></div>
        <div id="info-box" class="info-box mt-3"></div>

      </div>
    </aside>

    <!-- MAPA -->
    <section class="col-lg-9">
      <div id="map"></div>
    </section>

  </div>
</main>

<footer class="main-footer mt-4">
  <div class="container">
    <h6>TouristMacas</h6>
    <p class="small mb-0">Plataforma turística y de servicios</p>
  </div>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script type="module" src="js/script.js"></script>

</body>
</html>
